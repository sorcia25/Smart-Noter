name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - name: Set up LLVM (libclang for whisper-rs bindgen)
        shell: bash
        run: |
          if [ ! -f "/c/Program Files/LLVM/bin/libclang.dll" ]; then
            choco install llvm -y --no-progress
          fi
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
      - name: Generate IPC bindings
        # Generate the real bindings from the Rust IPC surface (same as the e2e job)
        # instead of a hand-maintained stub that drifts whenever a command/type is added.
        working-directory: src-tauri
        run: cargo run --bin specta-export
      - run: pnpm generate:i18n-keys
      - run: pnpm lint
      - run: pnpm check:node-types
      - run: pnpm check:hardcoded-strings
      - run: pnpm check:stories
      - run: pnpm test:coverage
      - run: pnpm build

  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --workspace
      - name: cargo check audio integration (compile gate)
        working-directory: src-tauri
        run: cargo check -p smart-noter-audio --features audio-integration --all-targets
      - name: cargo test audio integration
        working-directory: src-tauri
        run: cargo test -p smart-noter-audio --features audio-integration -- --include-ignored
        continue-on-error: true   # CI runners may not have audio hardware; gate softly
      - name: cargo check whisper integration (compile gate)
        working-directory: src-tauri
        run: cargo check -p smart-noter-whisper --features whisper-integration --all-targets
        continue-on-error: true   # whisper.cpp build needs LLVM/libclang + cmake on the runner; gate softly until CI installs them

  e2e:
    needs: [frontend, backend]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: pnpm install --frozen-lockfile
      - name: Set up LLVM (libclang for whisper-rs bindgen)
        shell: bash
        run: |
          if [ ! -f "/c/Program Files/LLVM/bin/libclang.dll" ]; then
            choco install llvm -y --no-progress
          fi
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
      - name: Generate IPC bindings + i18n keys
        working-directory: src-tauri
        run: cargo run --bin specta-export
      - run: pnpm generate:i18n-keys
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
