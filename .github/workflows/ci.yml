name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Bump to invalidate caches poisoned before sherpa-rs's download dir was cached.
          prefix-key: v1-rust
          # sherpa-rs-sys downloads prebuilt libs (cargs.lib, onnxruntime, …) into
          # %LOCALAPPDATA%\sherpa-rs, OUTSIDE target/. On a cache hit its build.rs is
          # skipped, so unless we cache this dir too the libs are gone on the fresh
          # runner VM and the link fails (LNK1181: cannot open input file 'cargs.lib').
          cache-directories: ~/AppData/Local/sherpa-rs
      - run: pnpm install --frozen-lockfile
      - name: Set up LLVM (libclang for whisper-rs bindgen)
        shell: bash
        run: |
          if [ ! -f "/c/Program Files/LLVM/bin/libclang.dll" ]; then
            choco install llvm -y --no-progress
          fi
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
      - name: Generate IPC bindings
        # Generate the real bindings from the Rust IPC surface (same as the e2e job)
        # instead of a hand-maintained stub that drifts whenever a command/type is added.
        working-directory: src-tauri
        shell: bash
        run: |
          cargo build --bin specta-export
          # sherpa-rs-sys's build.rs copies the onnx/sherpa runtime DLLs next to the exe,
          # but only when it runs (cache miss). On a cache hit it's skipped, so the exe
          # dies with STATUS_DLL_NOT_FOUND. Copy them from the cached download dir.
          find ~/AppData/Local/sherpa-rs -name '*.dll' -exec cp -f {} target/debug/ \;
          ./target/debug/specta-export.exe
      - run: pnpm generate:i18n-keys
      - run: pnpm lint
      - run: pnpm check:node-types
      - run: pnpm check:hardcoded-strings
      - run: pnpm check:stories
      - run: pnpm test:coverage
      - run: pnpm build

  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Bump to invalidate caches poisoned before sherpa-rs's download dir was cached.
          prefix-key: v1-rust
          # sherpa-rs-sys downloads prebuilt libs (cargs.lib, onnxruntime, …) into
          # %LOCALAPPDATA%\sherpa-rs, OUTSIDE target/. On a cache hit its build.rs is
          # skipped, so unless we cache this dir too the libs are gone on the fresh
          # runner VM and the link fails (LNK1181: cannot open input file 'cargs.lib').
          cache-directories: ~/AppData/Local/sherpa-rs
      - name: Set up LLVM (libclang for whisper-rs bindgen)
        shell: bash
        run: |
          if [ ! -f "/c/Program Files/LLVM/bin/libclang.dll" ]; then
            choco install llvm -y --no-progress
          fi
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
      - name: cargo fmt
        working-directory: src-tauri
        run: cargo fmt --all -- --check
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --workspace
      - name: cargo check audio integration (compile gate)
        working-directory: src-tauri
        run: cargo check -p smart-noter-audio --features audio-integration --all-targets
      - name: cargo test audio integration
        working-directory: src-tauri
        run: cargo test -p smart-noter-audio --features audio-integration -- --include-ignored
        continue-on-error: true   # CI runners may not have audio hardware; gate softly
      - name: cargo check whisper integration (compile gate)
        working-directory: src-tauri
        run: cargo check -p smart-noter-whisper --features whisper-integration --all-targets

  e2e:
    needs: [frontend, backend]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Bump to invalidate caches poisoned before sherpa-rs's download dir was cached.
          prefix-key: v1-rust
          # sherpa-rs-sys downloads prebuilt libs (cargs.lib, onnxruntime, …) into
          # %LOCALAPPDATA%\sherpa-rs, OUTSIDE target/. On a cache hit its build.rs is
          # skipped, so unless we cache this dir too the libs are gone on the fresh
          # runner VM and the link fails (LNK1181: cannot open input file 'cargs.lib').
          cache-directories: ~/AppData/Local/sherpa-rs
      - run: pnpm install --frozen-lockfile
      - name: Set up LLVM (libclang for whisper-rs bindgen)
        shell: bash
        run: |
          if [ ! -f "/c/Program Files/LLVM/bin/libclang.dll" ]; then
            choco install llvm -y --no-progress
          fi
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
      - name: Generate IPC bindings + i18n keys
        working-directory: src-tauri
        shell: bash
        run: |
          cargo build --bin specta-export
          # See the frontend job: copy the cached sherpa/onnx DLLs next to the exe so
          # it doesn't die with STATUS_DLL_NOT_FOUND on a rust-cache hit.
          find ~/AppData/Local/sherpa-rs -name '*.dll' -exec cp -f {} target/debug/ \;
          ./target/debug/specta-export.exe
      - run: pnpm generate:i18n-keys
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
