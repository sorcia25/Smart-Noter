pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check {staged_files}
    no-hardcoded-strings:
      glob: "src/**/*.tsx"
      run: node scripts/check-no-hardcoded-strings.mjs {staged_files}
    rust-fmt:
      glob: "*.rs"
      root: src-tauri/
      run: PATH="$HOME/.cargo/bin:$PATH" cargo fmt --check
    rust-clippy:
      glob: "*.rs"
      root: src-tauri/
      run: PATH="$HOME/.cargo/bin:$PATH" cargo clippy --workspace --all-targets -- -D warnings

commit-msg:
  commands:
    conventional:
      run: >
        bash -c "head -1 $LEFTHOOK_ARGS | grep -qE '^(feat|fix|chore|docs|refactor|test|style|perf|build|ci)(\(.+\))?: .+' || exit 1"
